name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.16"
          otp-version: "26"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: backend/deps
          key: elixir-deps-${{ hashFiles('backend/mix.lock') }}
          restore-keys: elixir-deps-

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: backend/_build
          key: elixir-build-${{ hashFiles('backend/mix.lock') }}-${{ hashFiles('backend/lib/**') }}
          restore-keys: elixir-build-

      - name: Install dependencies
        working-directory: ./backend
        run: mix deps.get

      - name: Check formatting
        working-directory: ./backend
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        working-directory: ./backend
        env:
          MIX_ENV: test
        run: mix compile --warnings-as-errors

      - name: Run tests with coverage
        working-directory: ./backend
        env:
          MIX_ENV: test
        run: mix test --cover

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: TypeScript check
        working-directory: ./frontend
        run: npx vue-tsc --noEmit

      - name: Lint
        working-directory: ./frontend
        run: npx eslint src --ext .ts,.vue

      - name: Run tests with coverage
        working-directory: ./frontend
        run: npx vitest run --coverage

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend-test, frontend-test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: skillforge:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [docker-build]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Start app via Docker
        run: |
          docker compose up --build -d
          sleep 20
          curl -f http://localhost:4000/api/health || (docker compose logs && exit 1)
        env:
          SECRET_KEY_BASE: test_secret_key_base_that_is_at_least_64_bytes_long_for_ci_testing_only
          ADMIN_EMAIL: admin@example.com
          ADMIN_PASSWORD: change-me-in-production

      - name: Run E2E tests
        working-directory: ./frontend
        run: npx playwright test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/
          retention-days: 7

      - name: Stop app
        if: always()
        run: docker compose down
