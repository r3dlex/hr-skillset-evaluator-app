name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pipeline:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build pipeline-runner image
        uses: docker/build-push-action@v5
        with:
          context: ./tools/pipeline_runner
          file: ./tools/pipeline_runner/Dockerfile
          load: true
          tags: pipeline-runner:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run pipeline
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace:ro" \
            pipeline-runner:ci \
            python -m pipeline_runner

      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: hr-skillset-evaluator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan for secrets with trufflehog
        run: |
          trufflehog git file://. --only-verified --fail

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit npm dependencies
        working-directory: ./frontend
        run: |
          npm ci --prefer-offline --no-audit
          npm audit --audit-level=high || true

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.16"
          otp-version: "26"

      - name: Audit Hex dependencies
        working-directory: ./backend
        run: |
          mix local.hex --force
          mix deps.get
          mix deps.audit || true
